<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chedar.dev | Projects</title>
    <link rel="shortcut icon" href="../favicon.png" type="image/png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@200..900&family=Wallpoet&display=swap');

        :root {
            /* LIGHT THEME */
            --bg: #ffffff;
            --grid: #d1d5db;
            --text: #242424;

            --header-bg: rgba(222, 222, 222, 0.3);
            --header-border: rgba(0, 0, 0, 0.1);

            --btn-bg: rgba(255, 255, 255, 0.1);
            --btn-border: rgba(0, 0, 0, 0.2);
            --btn-text: #505050;

            --btn-hover-bg: rgba(72, 72, 72, 0.2);
            --btn-hover-text: #1c1c1c;

            --menu-bg: rgba(255, 255, 255, 0.55);
            --menu-border: rgba(0, 0, 0, 0.15);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* DARK THEME */
                --bg: #111111;
                --grid: #333333;
                --text: #e5e5e5;

                --header-bg: rgba(40, 40, 40, 0.3);
                --header-border: rgba(255, 255, 255, 0.1);

                --btn-bg: rgba(255, 255, 255, 0.08);
                --btn-border: rgba(255, 255, 255, 0.2);
                --btn-text: #b7b7b7;

                --btn-hover-bg: rgba(255, 255, 255, 0.2);
                --btn-hover-text: #ffffff;

                --menu-bg: rgba(40, 40, 40, 0.55);
                --menu-border: rgba(255, 255, 255, 0.2);
            }
        }

        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* BODY */
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 1px 1px, var(--grid) 1px, transparent 0);
            background-size: 20px 20px;
            color: var(--text);
            padding-top: 100px;
            font-family: 'Source Code Pro', monospace;
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;

            position: fixed;
            top: 20px;

            width: 95%;
            left: 50%;
            transform: translateX(-50%);

            padding: 10px;
            z-index: 1000;

            background: var(--header-bg);
            backdrop-filter: blur(6px);
            border-radius: 10px;
            border: 1px solid var(--header-border);
        }

        header h1 {
            font-size: 2rem;
            color: var(--text);
        }

        header>a {
            text-decoration: none;
            color: inherit;
        }

        /* BUTTONS */
        .headerButtons {
            display: flex;
            gap: 20px;
        }

        .headerButtons a {
            text-decoration: none;
            background: var(--btn-bg);
            padding: 4px 12px;
            border: 1px solid var(--btn-border);
            border-radius: 5px;
            color: var(--btn-text);
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .headerButtons a:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
        }

        /* HAMBURGER */
        .menuToggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .menuToggle span {
            width: 25px;
            height: 3px;
            background: var(--text);
            border-radius: 3px;
            transition: 0.3s;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            header {
                width: 90%;
            }

            .menuToggle {
                display: flex;
                z-index: 1100;
            }

            .menuToggle.active span:nth-child(1) {
                transform: translateY(8px) rotate(45deg);
            }

            .menuToggle.active span:nth-child(2) {
                opacity: 0;
            }

            .menuToggle.active span:nth-child(3) {
                transform: translateY(-8px) rotate(-45deg);
            }

            .headerButtons {
                position: absolute;
                top: 70px;
                right: 0;
                width: 100%;
                flex-direction: column;
                gap: 10px;

                background: var(--menu-bg);
                backdrop-filter: blur(12px);

                border-radius: 10px;
                border: 1px solid var(--menu-border);

                padding: 10px;

                opacity: 0;
                transform: translateY(-10px);
                pointer-events: none;
                transition: all 0.3s ease;
            }

            .headerButtons.active {
                opacity: 1;
                transform: translateY(0);
                pointer-events: auto;
            }

            .headerButtons a {
                width: 100%;
                text-align: center;
                font-size: 1rem;
                padding: 8px;
                backdrop-filter: blur(2px);
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.3rem;
            }
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;

            background-color: var(--bg);
            background-image: radial-gradient(circle at 1px 1px, var(--grid) 1px, transparent 0);
            background-size: 20px 20px;

            transform: translateZ(0);
        }

        .title {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        main {
            text-align: center;
            margin-top: 40px;
        }

        .projects-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 40px auto;
        }

        .project-card {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--header-border);
            border-radius: 15px;
            padding: 25px;
            text-align: left;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .project-card:hover {
            border-color: var(--btn-border);
        }

        .project-tag {
            font-size: 0.8rem;
            background: var(--btn-hover-bg);
            color: var(--text);
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .project-card h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--text);
        }

        .project-card p {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--btn-text);
            margin-bottom: 20px;
        }

        .project-link {
            text-decoration: none;
            color: var(--text);
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .project-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .project-card {
                margin: 0 10px;
            }
        }

        .blurOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1050;
            backdrop-filter: blur(20px);

            opacity: 0;
            pointer-events: none;
            transition: opacity 0.75s ease-in-out;
        }

        .blurOverlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* I LOVE SCROLLBARS */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(200, 200, 200, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 999px;
            backdrop-filter: blur(4px);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(120, 120, 120, 0.5);
        }

        html {
            scrollbar-width: thin;
            scrollbar-color: rgba(200, 200, 200, 0.5) transparent;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                color-scheme: dark;
            }

            ::-webkit-scrollbar-track {
                background: #1e1e1e;
            }

            ::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.2);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }

            ::-webkit-scrollbar-thumb:hover {
                background: rgba(255, 255, 255, 0.3);
            }

            * {
                scrollbar-color: rgba(255, 255, 255, 0.2) #1e1e1e;
            }
        }
    </style>
</head>

<body>
    <div id="blurOverlay" class="blurOverlay"></div>
    <div class="bg"></div>
    <header>
        <a href="../">
            <h1>chedar.dev</h1>
        </a>

        <div class="menuToggle" id="menuToggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="headerButtons" id="menu">
            <a href="/projects/">Projects</a>
            <a href="/about/">About Me</a>
            <a href="/contact/">Contact</a>
        </div>
    </header>
    <main>
        <h2 class="title">Projects</h2>
        <div class="projects-container"></div>
    </main>
    <script type="module">
        async function blurToggle(url) {
            const overlay = document.getElementById("blurOverlay");
            if (overlay) {
                overlay.classList.toggle("active");
            }
            await new Promise(resolve => setTimeout(resolve, 850));
            window.location.href = url;
            overlay.classList.toggle("active");
        }

        function toggleMenu() {
            document.getElementById("menu").classList.toggle("active");
            document.getElementById("menuToggle").classList.toggle("active");
        }
        window.addEventListener("scroll", () => {
            const scrollY = window.scrollY;

            document.querySelector(".bg").style.backgroundPosition =
                `0px ${scrollY * -0.5}px`;
        });

        const projects = [
            { title: "Game Website", description: "Game website I made for my friends at school because all the others were blocked.", link: "https://goofyahhgames.vercel.app/", lang: "HTML • CSS • JS" },
            { title: "Discat", description: "A Discord ripoff i made for fun and chatting. VC Does work, it's just i need to set the token every day.", link: "https://discat.web.app", lang: "HTML • CSS • JS" },
            { title: "Dollar Store Minecraft", description: "A Minecraft clone I made in JS. It's pretty bad ngl, but it was a fun project to work on.", link: "https://795a3959326335796a7836754d54793461.hackingtons.dev/", lang: "HTML • CSS • JS" },
        ];

        for (const project of projects) {
            const card = document.createElement("article");
            card.className = "project-card";

            card.innerHTML = `
                <span class="project-tag">${project.lang}</span>
                <h3>${project.title}</h3>
                <p>
                    ${project.description}
                </p>
                <a href="#" onclick="blurToggle('${project.link}')" class="project-link">
                    View Project
                </a>
            `;

            document.querySelector(".projects-container").appendChild(card);
        }
        
        window.blurToggle = blurToggle;
        window.toggleMenu = toggleMenu;
    </script>

</body>

</html>
