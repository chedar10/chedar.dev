<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chedar.dev | About</title>
    <link rel="shortcut icon" href="../favicon.png" type="image/png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@200..900&family=Wallpoet&display=swap');

        :root {
            /* LIGHT THEME */
            --bg: #ffffff;
            --grid: #d1d5db;
            --text: #242424;

            --header-bg: rgba(222, 222, 222, 0.3);
            --header-border: rgba(0, 0, 0, 0.1);

            --btn-bg: rgba(255, 255, 255, 0.1);
            --btn-border: rgba(0, 0, 0, 0.2);
            --btn-text: #505050;

            --btn-hover-bg: rgba(72, 72, 72, 0.2);
            --btn-hover-text: #1c1c1c;

            --menu-bg: rgba(255, 255, 255, 0.55);
            --menu-border: rgba(0, 0, 0, 0.15);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* DARK THEME */
                --bg: #111111;
                --grid: #333333;
                --text: #e5e5e5;

                --header-bg: rgba(40, 40, 40, 0.3);
                --header-border: rgba(255, 255, 255, 0.1);

                --btn-bg: rgba(255, 255, 255, 0.08);
                --btn-border: rgba(255, 255, 255, 0.2);
                --btn-text: #b7b7b7;

                --btn-hover-bg: rgba(255, 255, 255, 0.2);
                --btn-hover-text: #ffffff;

                --menu-bg: rgba(40, 40, 40, 0.55);
                --menu-border: rgba(255, 255, 255, 0.2);
            }
        }

        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* BODY */
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 1px 1px, var(--grid) 1px, transparent 0);
            background-size: 20px 20px;
            color: var(--text);
            padding-top: 100px;
            font-family: 'Source Code Pro', monospace;
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;

            position: fixed;
            top: 20px;

            width: 95%;
            left: 50%;
            transform: translateX(-50%);

            padding: 10px;
            z-index: 1000;

            background: var(--header-bg);
            backdrop-filter: blur(6px);
            border-radius: 10px;
            border: 1px solid var(--header-border);
        }

        header h1 {
            font-size: 2rem;
            color: var(--text);
        }

        header>a {
            text-decoration: none;
            color: inherit;
        }

        /* BUTTONS */
        .headerButtons {
            display: flex;
            gap: 20px;
        }

        .headerButtons a {
            text-decoration: none;
            background: var(--btn-bg);
            padding: 4px 12px;
            border: 1px solid var(--btn-border);
            border-radius: 5px;
            color: var(--btn-text);
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .headerButtons a:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
        }

        /* HAMBURGER */
        .menuToggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .menuToggle span {
            width: 25px;
            height: 3px;
            background: var(--text);
            border-radius: 3px;
            transition: 0.3s;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            header {
                width: 90%;
            }

            .menuToggle {
                display: flex;
                z-index: 1100;
            }

            .menuToggle.active span:nth-child(1) {
                transform: translateY(8px) rotate(45deg);
            }

            .menuToggle.active span:nth-child(2) {
                opacity: 0;
            }

            .menuToggle.active span:nth-child(3) {
                transform: translateY(-8px) rotate(-45deg);
            }

            .headerButtons {
                position: absolute;
                top: 70px;
                right: 0;
                width: 100%;
                flex-direction: column;
                gap: 10px;

                background: var(--menu-bg);
                backdrop-filter: blur(12px);

                border-radius: 10px;
                border: 1px solid var(--menu-border);

                padding: 10px;

                opacity: 0;
                transform: translateY(-10px);
                pointer-events: none;
                transition: all 0.3s ease;
            }

            .headerButtons.active {
                opacity: 1;
                transform: translateY(0);
                pointer-events: auto;
            }

            .headerButtons a {
                width: 100%;
                text-align: center;
                font-size: 1rem;
                padding: 8px;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="../">
            <h1>chedar.dev</h1>
        </a>

        <div class="menuToggle" id="menuToggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="headerButtons" id="menu">
            <a href="/projects/">Projects</a>
            <a href="/about/">About Me</a>
            <a href="/contact/">Contact</a>
        </div>
    </header>

    <script>
        function toggleMenu() {
            document.getElementById("menu").classList.toggle("active");
            document.getElementById("menuToggle").classList.toggle("active");
        }
    </script>

</body>

</html>
