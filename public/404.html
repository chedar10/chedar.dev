<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chedar.dev | 404</title>

    <link rel="shortcut icon" href="favicon.png" type="image/png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@200..900&family=Wallpoet&display=swap');

        :root {
            --bg: #ffffff;
            --grid: #d1d5db;
            --text: #242424;
            --header-bg: rgba(222, 222, 222, 0.3);
            --header-border: rgba(0, 0, 0, 0.1);
            --btn-bg: rgba(255, 255, 255, 0.1);
            --btn-border: rgba(0, 0, 0, 0.2);
            --btn-text: #505050;
            --btn-hover-bg: rgba(72, 72, 72, 0.2);
            --btn-hover-text: #1c1c1c;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --grid: #333333;
                --text: #e5e5e5;
                --header-bg: rgba(40, 40, 40, 0.3);
                --header-border: rgba(255, 255, 255, 0.1);
                --btn-bg: rgba(255, 255, 255, 0.08);
                --btn-border: rgba(255, 255, 255, 0.2);
                --btn-text: #b7b7b7;
                --btn-hover-bg: rgba(255, 255, 255, 0.2);
                --btn-hover-text: #ffffff;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            color: var(--text);
            font-family: 'Source Code Pro', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: -1;

            background-color: var(--bg);

            background-size: 20px 20px, 20px 20px;

            background-position: 0 0, 0 0;

            transition: background-position 0.05s linear;
        }

        main {
            text-align: center;
            padding: 40px;
            background: var(--header-bg);
            border: 1px solid var(--header-border);
            backdrop-filter: blur(2px);
            border-radius: 20px;
            max-width: 90%;
            width: 500px;
        }

        h1 {
            font-size: 5rem;
            margin-bottom: 0;
            opacity: 0.9;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .terminal {
            background: rgba(0, 0, 0, 0.1);
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 30px;
            font-size: 0.9rem;
            border: 1px solid var(--header-border);
        }

        .terminal span.err {
            color: #ff5f56;
        }

        .terminal span.path {
            color: #50fa7b;
        }

        /* Dracula-style green for paths */

        .home-btn {
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            border: 1px solid var(--btn-border);
            background: var(--btn-bg);
            color: var(--btn-text);
            transition: 0.3s;
            display: inline-block;
        }

        .home-btn:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
        }
    </style>
</head>

<body>
    <canvas class="bg"></canvas>

    <main>
        <h1>404</h1>
        <h2>Route Not Found</h2>

        <div class="terminal">
            <p>$ fetch --resource "<span id="current-path" class="path">/</span>"</p>
            <p><span class="err">Error:</span> PAGE_LONG_GONE_:(</p>
            <p>>echo "Mason probably broke something."</p>
        </div>

        <a href="/" class="home-btn">Return to Safety</a>
    </main>

    <script>
        const cleanPath = window.location.pathname;
        document.getElementById('current-path').innerText = cleanPath;

        const canvas = document.querySelector(".bg");
        const ctx = canvas.getContext("2d");

        let width, height;
        let dots = [];

        const spacing = 20;
        const radius = 1.2;
        const influenceRadius = 150;

        let mouse = { x: -1000, y: -1000 };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            dots = [];
            for (let x = 0; x < width; x += spacing) {
                for (let y = 0; y < height; y += spacing) {
                    dots.push({ x, y });
                }
            }
        }
        window.addEventListener("resize", resize);
        resize();

        // track mouse
        window.addEventListener("mousemove", (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // subtle ambient movement
        let offsetX = 0;
        let offsetY = 0;

        function animate() {
            ctx.clearRect(0, 0, width, height);

            offsetX += 0.07;
            offsetY += 0.07;

            const baseColor = getComputedStyle(document.documentElement)
                .getPropertyValue('--grid').trim();

            // convert base color (hex) → rgb once per frame
            const hex = baseColor.replace('#', '');
            const baseR = parseInt(hex.substring(0, 2), 16);
            const baseG = parseInt(hex.substring(2, 4), 16);
            const baseB = parseInt(hex.substring(4, 6), 16);

            const orange = [255, 140, 0];

            for (const dot of dots) {
                const loopX = ((offsetX % spacing) + spacing) % spacing;
                const loopY = ((offsetY % spacing) + spacing) % spacing;

                const x = dot.x + loopX;
                const y = dot.y + loopY;

                const dx = x - mouse.x;
                const dy = y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                let color = baseColor;

                if (dist < influenceRadius) {
                    const t = Math.pow(1 - dist / influenceRadius, 2);

                    const mix = (a, b) => Math.round(a + (b - a) * t);

                    color = `rgb(${mix(baseR, orange[0])}, ${mix(baseG, orange[1])}, ${mix(baseB, orange[2])})`;
                }

                ctx.beginPath();
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.fillStyle = color;
                ctx.fill();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>

</html>
