<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chedar.dev | Contact</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Wallpoet&display=swap');   
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            display: flex;
            align-items: center;
            justify-self: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            width: 95%;
            padding: 10px;
            z-index: 1000;
            background: rgba(40, 40, 40, 0.3);
            backdrop-filter: blur(2px);
            border-radius: 10px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            font-family: 'Source Code Pro', monospace;
            font-size: 2rem;
            color: #d3d3d3;
        }

        body {
            background-color: #ffffff;
            background-image: radial-gradient(circle at 1px 1px, #d1d5db 1px, transparent 0);
            background-size: 20px 20px;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #111111;
                background-image: radial-gradient(circle at 1px 1px, #333333 1px, transparent 0);
                color: white;
            }
        }
        .headerButtons {
            display: flex;
            gap: 20px;
        }
        .headerButtons a {
            font-family: 'Source Code Pro', monospace;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #d3d3d3;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }
        .headerButtons a:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <header>
        <h1>chedar.dev</h1>
        <div class="headerButtons">
            <a href="/projects/">Projects</a>
            <a href="/projects/">About Me</a>
            <a href="/projects/">Contact</a>
        </div>
    </header>
</body>

</html>
