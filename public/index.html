<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chedar.dev | Home</title>

    <link rel="shortcut icon" href="favicon.png" type="image/png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@200..900&family=Wallpoet&display=swap');

        :root {
            /* LIGHT THEME */
            --bg: #ffffff;
            --grid: #d1d5db;
            --text: #242424;

            --header-bg: rgba(222, 222, 222, 0.3);
            --header-border: rgba(0, 0, 0, 0.1);

            --btn-bg: rgba(255, 255, 255, 0.1);
            --btn-border: rgba(0, 0, 0, 0.2);
            --btn-text: #505050;

            --btn-hover-bg: rgba(72, 72, 72, 0.2);
            --btn-hover-text: #1c1c1c;

            --menu-bg: rgba(255, 255, 255, 0.55);
            --menu-border: rgba(0, 0, 0, 0.15);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* DARK THEME */
                --bg: #111111;
                --grid: #333333;
                --text: #e5e5e5;

                --header-bg: rgba(40, 40, 40, 0.3);
                --header-border: rgba(255, 255, 255, 0.1);

                --btn-bg: rgba(255, 255, 255, 0.08);
                --btn-border: rgba(255, 255, 255, 0.2);
                --btn-text: #b7b7b7;

                --btn-hover-bg: rgba(255, 255, 255, 0.2);
                --btn-hover-text: #ffffff;

                --menu-bg: rgba(40, 40, 40, 0.55);
                --menu-border: rgba(255, 255, 255, 0.2);
            }
        }

        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* BODY */
        body {
            color: var(--text);
            padding-top: 100px;
            font-family: 'Source Code Pro', monospace;
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;

            position: fixed;
            top: 20px;

            width: 95%;
            left: 50%;
            transform: translateX(-50%);

            padding: 10px;
            z-index: 1000;

            background: var(--header-bg);
            backdrop-filter: blur(2px);
            border-radius: 10px;
            border: 1px solid var(--header-border);
        }

        header h1 {
            font-size: 2rem;
            color: var(--text);
        }

        header>a {
            text-decoration: none;
            color: inherit;
        }

        /* BUTTONS */
        .headerButtons {
            display: flex;
            gap: 20px;
        }

        .headerButtons a {
            text-decoration: none;
            background: var(--btn-bg);
            padding: 4px 12px;
            border: 1px solid var(--btn-border);
            border-radius: 5px;
            color: var(--btn-text);
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .headerButtons a:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
        }

        /* Roblox *HAMBURGER* sfx */
        .menuToggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .menuToggle span {
            width: 25px;
            height: 3px;
            background: var(--text);
            border-radius: 3px;
            transition: 0.3s;
        }

        @media (max-width: 768px) {
            header {
                width: 90%;
            }

            .menuToggle {
                display: flex;
                z-index: 1100;
            }

            .menuToggle.active span:nth-child(1) {
                transform: translateY(8px) rotate(45deg);
            }

            .menuToggle.active span:nth-child(2) {
                opacity: 0;
            }

            .menuToggle.active span:nth-child(3) {
                transform: translateY(-8px) rotate(-45deg);
            }

            .headerButtons {
                position: absolute;
                top: 70px;
                right: 0;
                width: 100%;
                flex-direction: column;
                gap: 10px;

                background: var(--menu-bg);
                backdrop-filter: blur(10px);

                border-radius: 10px;
                border: 1px solid var(--menu-border);

                padding: 10px;

                opacity: 0;
                transform: translateY(-10px);
                pointer-events: none;
                transition: all 0.3s ease;
            }

            .headerButtons.active {
                opacity: 1;
                transform: translateY(0);
                pointer-events: auto;
            }

            .headerButtons a {
                width: 100%;
                text-align: center;
                font-size: 1rem;
                padding: 8px;
                backdrop-filter: blur(10px);
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.3rem;
            }
        }

        /* MAIN STUFF */
        main {
            width: 95%;
            max-width: 1100px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 80px;
        }

        /* Hero But Idk why ppl call it a hero, i mean it didn't save anybody. */
        .hero {
            text-align: center;
            margin-top: 40px;
        }

        .hero h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .heroButtons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .heroButtons a {
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--btn-border);
            background: var(--btn-bg);
            color: var(--btn-text);
            transition: 0.3s;
        }

        .heroButtons a:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
        }

        .projects h3,
        .skills h3,
        .about h3,
        .cta h3 {
            margin-bottom: 20px;
            font-size: 1.6rem;
        }

        .projectGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .projectCard {
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--header-border);
            background: var(--header-bg);
            backdrop-filter: blur(2px);
            transition: 0.3s;
        }

        .projectCard:hover {
            transform: translateY(-5px);
        }

        .projectCard h4 {
            margin-bottom: 8px;
        }

        .projectCard p {
            font-size: 0.95rem;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .projectCard span {
            font-size: 0.8rem;
            opacity: 0.6;
            display: block;
            margin-bottom: 10px;
        }

        .projectCard a {
            text-decoration: none;
            font-size: 0.9rem;
            color: var(--btn-text);
        }

        .skillGroups {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .skillGroups div {
            background: var(--header-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--header-border);
            backdrop-filter: blur(2px);
        }

        .about p {
            max-width: 600px;
            opacity: 0.80;
        }

        .cta {
            text-align: center;
            padding: 40px 20px;
            border-radius: 12px;
            background: var(--header-bg);
            border: 1px solid var(--header-border);
            backdrop-filter: blur(1px);
            margin-bottom: 20px;
        }

        .cta a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            padding: 5px 9px;
            border-radius: 6px;
            border: 1px solid var(--btn-border);
            background: var(--btn-bg);
            color: var(--btn-text);
            transition: 0.3s;
        }

        .cta a:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
        }

        @media (max-width: 768px) {
            main {
                gap: 50px;
            }

            .hero h2 {
                font-size: 2rem;
            }

            .skillGroups {
                flex-direction: column;
                gap: 15px;
            }
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;

            background-color: var(--bg);
            background-image: radial-gradient(circle at 1px 1px, var(--grid) 1px, transparent 0);
            background-size: 20px 20px;

            transform: translateZ(0);
        }

        /* I LOVE SCROLLBARS */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(200, 200, 200, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 999px;
            backdrop-filter: blur(4px);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(120, 120, 120, 0.5);
        }

        html {
            scrollbar-width: thin;
            scrollbar-color: rgba(200, 200, 200, 0.5) transparent;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                color-scheme: dark;
            }

            ::-webkit-scrollbar-track {
                background: #1e1e1e;
            }

            ::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.2);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }

            ::-webkit-scrollbar-thumb:hover {
                background: rgba(255, 255, 255, 0.3);
            }

            * {
                scrollbar-color: rgba(255, 255, 255, 0.2) #1e1e1e;
            }
        }
    </style>
</head>

<body>
    <div class="bg"></div>
    <header>
        <a href="../">
            <h1>chedar.dev</h1>
        </a>

        <div class="menuToggle" id="menuToggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="headerButtons" id="menu">
            <a href="/projects/">Projects</a>
            <a href="/about/">About Me</a>
            <a href="/contact/">Contact</a>
        </div>
    </header>
    <main>
        <section class="hero">
            <h2>Hi, I’m Mason.</h2>
            <p>I do weird things with weird stuff i can't understand (Joking)</p>

            <div class="heroButtons">
                <a href="/projects/">View Projects</a>
                <a href="/about/">About Me</a>
                <a href="/contact/">Contact Meeeee</a>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@box2d/core@latest/dist/index.min.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById("menu").classList.toggle("active");
            document.getElementById("menuToggle").classList.toggle("active");
        }
        window.addEventListener("scroll", () => {
            const scrollY = window.scrollY;

            document.querySelector(".bg").style.backgroundPosition =
                `0px ${scrollY * -0.5}px`;
        });
    </script>

</body>

</html>
